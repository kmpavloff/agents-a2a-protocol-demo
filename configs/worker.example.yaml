# Worker (orders-agent) configuration — EXAMPLE.
#
# Copy this file to `configs/worker.yaml` and fill in your LLM connection:
#   cp configs/worker.example.yaml configs/worker.yaml
#
# The real `configs/worker.yaml` is gitignored because it holds your API key.
# Every value can also be overridden with env vars (see internal/config):
# WORKER_LISTEN_ADDR, WORKER_PUBLIC_URL, WORKER_DATA_PATH, LLM_BASE_URL,
# LLM_MODEL, LLM_API_KEY.
listen_addr: ":8081"
public_url: "http://localhost:8081"
data_path: "data/orders.json"
llm:
  # OpenAI-compatible endpoint. Examples:
  #   LM Studio (local): http://localhost:1234/v1
  #   remote provider:   https://api.your-provider.com/v1
  base_url: "http://localhost:1234/v1"
  model: "your-model-name"
  api_key: "your-api-key" # any non-empty string works for LM Studio
